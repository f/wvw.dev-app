name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust_target: aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            rust_target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
            rust_target: ""
          - platform: windows-latest
            args: ""
            rust_target: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install npm dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "WVW v__VERSION__"
          releaseBody: "Download WVW — World Vibe Web desktop app for your platform."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  homebrew:
    needs: release
    runs-on: macos-latest
    steps:
      - name: Get version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "number=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Download DMGs and compute SHA256
        id: sha
        env:
          VERSION: ${{ steps.version.outputs.tag }}
        run: |
          VERSION_NUM="${VERSION#v}"
          curl -sL "https://github.com/f/wvw.dev-app/releases/download/${VERSION}/WVW_${VERSION_NUM}_aarch64.dmg" -o arm64.dmg
          curl -sL "https://github.com/f/wvw.dev-app/releases/download/${VERSION}/WVW_${VERSION_NUM}_x64.dmg" -o x64.dmg
          echo "sha256_arm64=$(shasum -a 256 arm64.dmg | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "sha256_x64=$(shasum -a 256 x64.dmg | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew Cask tap
        env:
          TAP_REPO_TOKEN_HOMEBREW: ${{ secrets.TAP_REPO_TOKEN_HOMEBREW }}
          VERSION: ${{ steps.version.outputs.tag }}
          SHA256_ARM64: ${{ steps.sha.outputs.sha256_arm64 }}
          SHA256_X64: ${{ steps.sha.outputs.sha256_x64 }}
        run: |
          VERSION_NUM="${VERSION#v}"
          git clone https://x-access-token:${TAP_REPO_TOKEN_HOMEBREW}@github.com/f/homebrew-tap.git tap
          mkdir -p tap/Casks
          cat > tap/Casks/wvw.rb << EOF
          cask "wvw" do
            version "${VERSION_NUM}"

            on_arm do
              sha256 "${SHA256_ARM64}"
              url "https://github.com/f/wvw.dev-app/releases/download/${VERSION}/WVW_#{version}_aarch64.dmg"
            end

            on_intel do
              sha256 "${SHA256_X64}"
              url "https://github.com/f/wvw.dev-app/releases/download/${VERSION}/WVW_#{version}_x64.dmg"
            end

            name "WVW"
            desc "World Vibe Web — the distributed app store for vibe-coded projects"
            homepage "https://wvw.dev"

            depends_on macos: ">= :catalina"

            app "WVW.app"

            postflight do
              system_command "/usr/bin/xattr", args: ["-cr", "#{appdir}/WVW.app"]
            end

            zap trash: [
              "~/Library/Preferences/dev.wvw.desktop.plist",
              "~/Library/Saved Application State/dev.wvw.desktop.savedState",
              "~/Library/WebKit/dev.wvw.desktop",
            ]
          end
          EOF
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Update WVW to ${VERSION}"
          git push
